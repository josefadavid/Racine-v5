<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racines v5 — Évaluation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="device">
  <div class="status-bar"><span class="time">9:41</span><span class="icons">●●● WiFi 🔋</span></div>
  <!-- PAGE : TROCVERT ÉVALUER — trocvert-evaluer.html -->
  <div class="screen active" id="s-troc-rate">
    <div class="troc-header"><div class="troc-greeting">Échange complété 🎉</div><div class="troc-title">Évalue ton échange</div></div>
    <div style="padding:22px 18px;flex:1;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:2.8rem;margin-bottom:8px;">🧑‍🌾</div>
        <div style="font-weight:700;color:var(--text);font-size:0.96rem;margin-bottom:4px;">Marie L.</div>
        <div style="font-size:0.8rem;color:var(--text-lt);">Tomates cerises ↔ Basilic</div>
      </div>
      <div style="background:var(--white);border-radius:16px;padding:18px;text-align:center;box-shadow:0 2px 10px rgba(74,55,40,0.07);margin-bottom:14px;">
        <div style="font-size:0.8rem;color:var(--text-lt);margin-bottom:12px;font-weight:700;">Comment s'est passé l'échange ?</div>
        <div class="star-rating" id="stars">
          <span class="star" onclick="rateStar(1)">⭐</span>
          <span class="star" onclick="rateStar(2)">⭐</span>
          <span class="star" onclick="rateStar(3)">⭐</span>
          <span class="star" onclick="rateStar(4)">⭐</span>
          <span class="star" onclick="rateStar(5)">⭐</span>
        </div>
        <div id="star-label" style="font-size:0.76rem;color:var(--text-lt);margin-top:8px;height:18px;"></div>
      </div>
      <div style="background:var(--white);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(74,55,40,0.07);margin-bottom:14px;">
        <div style="font-size:0.6rem;color:var(--text-lt);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700;">Un commentaire ?</div>
        <textarea style="width:100%;background:var(--beige);border:none;border-radius:10px;padding:10px;font-family:'Lato',sans-serif;font-size:0.83rem;color:var(--text);resize:none;height:65px;outline:none;" placeholder="Très sympa, les tomates étaient délicieuses !"></textarea>
      </div>
      <button class="btn btn-troc" style="margin-bottom:8px;" onclick="toast('Évaluation envoyée 🌟');setTimeout(()=>go('trocvert'),900)">✅ Envoyer mon évaluation</button>
      <button class="btn btn-ghost" onclick="go('trocvert')">Passer</button>
    </div>
    <div class="bottom-nav">
      <div class="nav-item" onclick="go('accueil')"><div class="nav-icon">🏠</div><div class="nav-label">Accueil</div></div>
      <div class="nav-item" onclick="go('budget')"><div class="nav-icon">💰</div><div class="nav-label">Budget</div></div>
      <div class="nav-item" onclick="go('diy')"><div class="nav-icon">🍞</div><div class="nav-label">DIY</div></div>
      <div class="nav-item cal-nav" onclick="go('calendrier')"><div class="nav-icon">📅</div><div class="nav-label">Calendrier</div></div>
      <div class="nav-item" onclick="go('boutique')"><div class="nav-icon">🌾</div><div class="nav-label">Boutique</div></div>
      <div class="nav-item troc-nav active" onclick="go('trocvert')"><div class="nav-icon">🔄</div><div class="nav-label">TrocVert</div></div>
    </div>
  </div>
</div>
<div class="device-label">Racines v5 — Évaluation</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
