<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racines — Bienvenue</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- ======================================================
       PAGE : ONBOARDING — Étape 1/3
       Fichier : ob1.html
       Lien vers : ob2.html
       ====================================================== -->
  <div class="screen active" id="s-ob1">
    <div class="ob-header">
      <div class="ob-step">Étape 1 sur 3</div>
      <div class="ob-progress">
        <div class="ob-dot active"></div>
        <div class="ob-dot"></div>
        <div class="ob-dot"></div>
      </div>
      <div class="ob-question">Tu as quoi comme espace pour jardiner ?</div>
    </div>
    <div class="ob-body">
      <div class="ob-options">
        <div class="ob-option" onclick="selectOb(this,'ob2','espace','🏙️ Balcon ou terrasse')">
          <div class="ob-icon">🏙️</div>
          <div><div class="ob-text">Un balcon ou une terrasse</div><div class="ob-sub">En appartement ou en ville</div></div>
        </div>
        <div class="ob-option" onclick="selectOb(this,'ob2','espace','🏡 Petit jardin')">
          <div class="ob-icon">🏡</div>
          <div><div class="ob-text">Un petit jardin</div><div class="ob-sub">Cour arrière, parterre</div></div>
        </div>
        <div class="ob-option" onclick="selectOb(this,'ob2','espace','🌾 Grand terrain')">
          <div class="ob-icon">🌾</div>
          <div><div class="ob-text">Un grand terrain</div><div class="ob-sub">Champ, potager spacieux</div></div>
        </div>
        <div class="ob-option" onclick="selectOb(this,'ob2','espace','✨ Je rêve encore')">
          <div class="ob-icon">✨</div>
          <div><div class="ob-text">Rien encore — je rêve</div><div class="ob-sub">Je me prépare pour plus tard</div></div>
        </div>
      </div>
    </div>
  </div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
